name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint  # Don't run tests if lint fails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # Optional: security scanning
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install bandit

      - name: Run Bandit security scan
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # Optional: check that the model trains successfully
  train:
    name: Train check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Create data directory with dummy dataset
        run: |
          mkdir -p data
          # The train script expects creditcard.csv
          # We'll use a tiny synthetic dataset for CI
          python -c "
          import pandas as pd
          import numpy as np
          np.random.seed(42)
          n = 1000
          data = {
              'Time': np.random.uniform(0, 172000, n),
              'Amount': np.random.exponential(100, n),
              'Class': np.random.choice([0, 1], n, p=[0.998, 0.002])
          }
          # Add V1-V28
          for i in range(1, 29):
              data[f'V{i}'] = np.random.normal(0, 1, n)
          df = pd.DataFrame(data)
          df.to_csv('data/creditcard.csv', index=False)
          print('Synthetic dataset created for CI')
          "

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training script
        run: python train_model.py

      - name: Verify model artifacts exist
        run: |
          ls -la models/
          test -f models/fraud_model.joblib || exit 1
          test -f models/scaler.joblib || exit 1

  # Optional: Docker build test
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: fraud-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check
        run: |
          docker run -d --name fraud-api -p 8000:8000 fraud-api:ci
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop fraud-api
          docker rm fraud-api

  # Optional: publish test results
  publish-test-results:
    name: Publish test results
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: pytest-results
          path: test-results
        continue-on-error: true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results/*.xml
          check_name: Test Results