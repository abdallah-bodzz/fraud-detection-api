name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  size-label:
    name: PR size label
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add size label
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}